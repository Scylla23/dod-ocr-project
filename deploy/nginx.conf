server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    client_max_body_size 50M;

    # Direct health check (e.g. from CI on the box, or external monitor)
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # Backend API for the OCR app — strip /app/pdfextractor/api/ before forwarding.
    # The trailing slash on proxy_pass + matching trailing slash in location is what does the strip.
    location ^~ /app/pdfextractor/api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /app/pdfextractor/api;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SPA at /app/pdfextractor/  — static files with SPA fallback.
    # Fallback URI is absolute so it re-matches THIS same location and
    # resolves to the alias root + /index.html (avoids the alias+try_files
    # gotcha where a bare /index.html would re-match `location /` and 404).
    location ^~ /app/pdfextractor/ {
        alias /opt/dod-ocr/frontend/dist/;
        try_files $uri $uri/ /app/pdfextractor/index.html;

        # Ubuntu's bundled mime.types maps .js but not .mjs; without this,
        # nginx serves pdf.worker.min.mjs as application/octet-stream and
        # browsers refuse to instantiate the module worker, breaking PDF render.
        location ~ \.mjs$ {
            default_type application/javascript;
        }
    }

    # Bare /app/pdfextractor (no trailing slash) — redirect to slash form
    location = /app/pdfextractor {
        return 301 /app/pdfextractor/;
    }

    # Demo URL — internally rewrite to the SPA's index.html which is served
    # by the /app/pdfextractor/ location above. Asset URLs in that index.html
    # (referencing /app/pdfextractor/assets/...) then load fine.
    location ^~ /demo/usace-digital-library {
        rewrite ^ /app/pdfextractor/index.html last;
    }

    # Everything else — Server-A is the public face; direct hits to OCI for unknown paths get 404.
    location / {
        return 404;
    }
}
